# ================================
# SONAR PROJECT CONFIGURATION
# ================================

# Organization (taken from GitHub secret or env variable)
sonar.organization=${env.SONAR_ORGANIZATION}

# Project details
sonar.projectKey=23suca16-sys_bankingsystem4-backend
sonar.projectName=bank-management-system
sonar.projectVersion=1.0

# Source code location
sonar.sources=src/main/java

# Test code location
sonar.tests=src/test/java

# Encoding
sonar.sourceEncoding=UTF-8

# ================================
# COVERAGE CONFIG (CRITICAL FIX)
# ================================

# Path to JaCoCo XML report
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ================================
# OPTIONAL (BETTER ANALYSIS)
# ================================

# Exclude test files from coverage
sonar.exclusions=**/test/**

# Ignore generated files if any
sonar.coverage.exclusions=**/config/**,**/entity/**
